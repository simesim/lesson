<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🧠 Квиз‑игра: 30 вопросов компьютерной грамотности</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e5f0fc 0%, #f3f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.2rem;
      margin: 0;
      color: #12273f;
    }

    .quiz-wrapper {
      max-width: 650px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 50px -15px rgba(0,15,30,0.2), inset 0 1px 1px rgba(255,255,255,0.8);
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.7);
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.2rem);
      font-weight: 700;
      background: linear-gradient(140deg, #0b2b41, #1f5679);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .xp-badge {
      background: #ffb82e;
      color: #2e2000;
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 700;
      margin-left: auto;
      box-shadow: 0 6px 14px rgba(255,170,0,0.5);
      -webkit-text-fill-color: #2e2000;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .progress-area {
      background: #ebf4fe;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      margin: 1.3rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .progress-text {
      font-weight: 650;
      color: #1c4461;
    }

    .progress-bar {
      flex: 1;
      height: 10px;
      background: #cddff2;
      border-radius: 10px;
      overflow: hidden;
      min-width: 100px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #1f5b8c;
      border-radius: 10px;
      transition: width 0.2s;
    }

    .question-card {
      background: white;
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 1.2rem 0;
      box-shadow: 0 8px 22px rgba(0,0,0,0.04);
      border: 1px solid #e2edf9;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 650;
      margin-bottom: 1.3rem;
      line-height: 1.4;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .option-btn {
      background: #f2f7fd;
      border: 2px solid transparent;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      text-align: left;
      font-weight: 550;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #15293e;
    }

    .option-btn:hover {
      background: #e1edfc;
    }

    .option-btn.correct-choice {
      background: #d4edda;
      border-color: #2a7a3a;
      font-weight: 700;
    }

    .option-btn.wrong-choice {
      background: #ffe0e0;
      border-color: #b12a2a;
    }

    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.85;
    }

    .explanation {
      background: #f9fafe;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #2e4b63;
      border-left: 4px solid #2d7fc1;
    }

    .btn {
      background: #1b4b73;
      border: none;
      color: white;
      font-weight: 700;
      padding: 0.9rem 2rem;
      border-radius: 2.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      min-height: 50px;
      min-width: 140px;
      box-shadow: 0 6px 16px rgba(26,73,114,0.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; }

    .result-area {
      text-align: center;
    }

    .score-circle {
      font-size: 3rem;
      font-weight: 800;
      background: #d7e9ff;
      display: inline-block;
      padding: 1rem 2rem;
      border-radius: 50%;
      margin: 1rem 0;
    }

    @media (max-width: 500px) {
      .quiz-wrapper { padding: 1.3rem 1rem; }
      .option-btn { padding: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="quiz-wrapper">
  <h1>
    🎮 Квиз‑игра
    <span class="xp-badge" id="xpDisplay">⚡ 0 XP</span>
  </h1>
  <div class="progress-area">
    <span class="progress-text" id="questionCounter">1/30</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>
  </div>

  <div id="quizContainer" class="question-card"></div>
  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem;">
    <button class="btn" id="nextBtn" style="display: none;">Далее ➡️</button>
  </div>
  <div id="finalResult" style="display: none;" class="result-area"></div>
</div>

<script>
  (function() {
    // Массив из 30 вопросов с пояснениями
    const questions = [
      {
        question: "1. Что такое процессор (CPU)?",
        options: ["Устройство для долговременного хранения", "«Мозг» компьютера, выполняющий вычисления", "Устройство вывода изображения", "Блок питания"],
        correct: 1,
        explanation: "Процессор — центральный вычислительный компонент, обрабатывает инструкции программ."
      },
      {
        question: "2. Для чего нужна оперативная память (RAM)?",
        options: ["Хранить файлы после выключения", "Временно хранить данные запущенных программ", "Улучшать графику", "Охлаждать процессор"],
        correct: 1,
        explanation: "ОЗУ — быстрая энергозависимая память для текущих задач. При выключении данные стираются."
      },
      {
        question: "3. SSD — это…",
        options: ["Тип монитора", "Оперативная память", "Твердотельный накопитель для хранения данных", "Система охлаждения"],
        correct: 2,
        explanation: "SSD (Solid‑State Drive) — быстрый накопитель без движущихся частей."
      },
      {
        question: "4. Какое устройство относится к устройствам ВВОДА?",
        options: ["Монитор", "Принтер", "Мышь", "Колонки"],
        correct: 2,
        explanation: "Мышь передаёт команды от пользователя в компьютер."
      },
      {
        question: "5. Какое устройство относится к устройствам ВЫВОДА?",
        options: ["Клавиатура", "Микрофон", "Монитор", "Сканер"],
        correct: 2,
        explanation: "Монитор отображает информацию, полученную от компьютера."
      },
      {
        question: "6. Какая комбинация клавиш копирует выделенный текст?",
        options: ["Ctrl+X", "Ctrl+V", "Ctrl+C", "Ctrl+Z"],
        correct: 2,
        explanation: "Ctrl+C — копировать, Ctrl+V — вставить, Ctrl+X — вырезать."
      },
      {
        question: "7. Чтобы вставить скопированный объект, нужно нажать:",
        options: ["Ctrl+P", "Ctrl+V", "Shift+Ins", "Ctrl+Ins"],
        correct: 1,
        explanation: "Стандартное сочетание для вставки — Ctrl+V."
      },
      {
        question: "8. Какая комбинация отменяет последнее действие?",
        options: ["Ctrl+Y", "Ctrl+Z", "Ctrl+Shift+Z", "Alt+Backspace"],
        correct: 1,
        explanation: "Ctrl+Z — универсальная отмена во многих программах."
      },
      {
        question: "9. Что делает сочетание Win+D?",
        options: ["Блокирует компьютер", "Открывает диспетчер задач", "Сворачивает все окна / показывает рабочий стол", "Переключает язык"],
        correct: 2,
        explanation: "Win+D мгновенно сворачивает все окна и показывает рабочий стол."
      },
      {
        question: "10. Как быстро открыть Диспетчер задач?",
        options: ["Ctrl+Alt+Del (выбрать пункт)", "Ctrl+Shift+Esc", "Win+T", "Alt+F4"],
        correct: 1,
        explanation: "Ctrl+Shift+Esc запускает Диспетчер задач напрямую, без дополнительного меню."
      },
      {
        question: "11. Зачем нужен блок питания в компьютере?",
        options: ["Преобразует электричество и питает компоненты", "Охлаждает процессор", "Хранит резервные копии", "Усиливает Wi‑Fi"],
        correct: 0,
        explanation: "Блок питания (PSU) подаёт стабильное напряжение на все комплектующие."
      },
      {
        question: "12. Материнская плата выполняет функцию:",
        options: ["Обработки графики", "Соединения всех компонентов и передачи данных", "Звукозаписи", "Зарядки аккумулятора"],
        correct: 1,
        explanation: "Материнская плата — основа, к которой подключаются процессор, ОЗУ, видеокарта и др."
      },
      {
        question: "13. Какое расширение обычно имеет текстовый документ?",
        options: [".exe", ".jpg", ".txt", ".mp3"],
        correct: 2,
        explanation: ".txt — простой текстовый файл, .exe — исполняемый, .jpg — изображение."
      },
      {
        question: "14. Как создать новую папку в Проводнике Windows?",
        options: ["Дважды кликнуть по пустому месту", "Правая кнопка мыши → Создать → Папку", "Нажать Delete", "Нажать F5"],
        correct: 1,
        explanation: "Контекстное меню (правая кнопка) → Создать → Папку. Также работает Ctrl+Shift+N."
      },
      {
        question: "15. Что такое фишинг?",
        options: ["Антивирусная программа", "Мошенничество с целью кражи личных данных", "Игровая приставка", "Название процессора"],
        correct: 1,
        explanation: "Фишинг — злоумышленники выдают себя за надёжные организации, чтобы получить пароли и данные."
      },
      {
        question: "16. Какая программа помогает защитить компьютер от вирусов?",
        options: ["Браузер", "Файловый менеджер", "Антивирус", "Калькулятор"],
        correct: 2,
        explanation: "Антивирус (например, Microsoft Defender) обнаруживает и удаляет вредоносные программы."
      },
      {
        question: "17. Облачное хранилище (например, OneDrive) — это:",
        options: ["Жёсткий диск внутри ПК", "Флешка", "Удалённые серверы для хранения файлов в интернете", "Оперативная память"],
        correct: 2,
        explanation: "Данные хранятся на серверах в дата‑центрах, доступны через интернет."
      },
      {
        question: "18. Что из перечисленного НЕ является веб‑браузером?",
        options: ["Google Chrome", "Mozilla Firefox", "Microsoft Word", "Opera"],
        correct: 2,
        explanation: "Microsoft Word — текстовый редактор, а не браузер."
      },
      {
        question: "19. Для чего служит кулер (вентилятор) в системном блоке?",
        options: ["Увеличение скорости интернета", "Охлаждение компонентов", "Подсветка корпуса", "Усиление звука"],
        correct: 1,
        explanation: "Кулер отводит тепло от процессора, видеокарты и других деталей."
      },
      {
        question: "20. Как посмотреть основные характеристики компьютера (ОЗУ, процессор) в Windows?",
        options: ["Нажать Win+Pause (или правой кнопкой по «Этот компьютер» → Свойства)", "Нажать Alt+F4", "Запустить Paint", "Нажать F1"],
        correct: 0,
        explanation: "Окно «Система» показывает процессор, объём ОЗУ и версию Windows."
      },
      {
        question: "21. Что произойдёт при нажатии Alt+F4 на рабочем столе?",
        options: ["Откроется справка", "Закроется активное окно (или меню завершения работы)", "Запустится игра", "Сделается скриншот"],
        correct: 1,
        explanation: "Alt+F4 закрывает текущее окно. На рабочем столе вызывает диалог выключения."
      },
      {
        question: "22. Как сделать снимок всего экрана (скриншот) стандартными средствами Windows?",
        options: ["Нажать кнопку Print Screen (PrtSc)", "Нажать Ctrl+P", "Правой кнопкой по рабочему столу", "Нажать Win+L"],
        correct: 0,
        explanation: "Print Screen копирует снимок экрана в буфер обмена. Win+Shift+S — выделение области."
      },
      {
        question: "23. Какой тип накопителя обычно работает быстрее?",
        options: ["HDD (жёсткий диск)", "SSD (твердотельный)", "DVD‑диск", "Дискета"],
        correct: 1,
        explanation: "SSD не имеет движущихся частей и значительно быстрее HDD."
      },
      {
        question: "24. Какое устройство может одновременно быть и вводом, и выводом?",
        options: ["Принтер", "Колонки", "Сенсорный экран", "Микрофон"],
        correct: 2,
        explanation: "Сенсорный экран принимает касания (ввод) и отображает картинку (вывод)."
      },
      {
        question: "25. Какая память очищается при выключении питания компьютера?",
        options: ["Оперативная память (RAM)", "SSD", "Жёсткий диск", "USB‑флешка"],
        correct: 0,
        explanation: "ОЗУ энергозависима — все данные в ней теряются при отключении питания."
      },
      {
        question: "26. Зачем нужна учётная запись Microsoft в Windows?",
        options: ["Только для игр", "Синхронизация настроек и доступ к облачным сервисам", "Для работы калькулятора", "Без неё компьютер не включится"],
        correct: 1,
        explanation: "Учётная запись позволяет хранить файлы в OneDrive, синхронизировать пароли и настройки."
      },
      {
        question: "27. Как безопасно выключить зависший компьютер, если он не реагирует?",
        options: ["Дёрнуть шнур питания", "Удерживать кнопку питания несколько секунд до отключения", "Ждать, пока само пройдёт", "Нажать все клавиши сразу"],
        correct: 1,
        explanation: "Длительное удержание кнопки питания принудительно обесточит систему."
      },
      {
        question: "28. Какая комбинация открывает поиск в Windows (поиск файлов, приложений)?",
        options: ["Win+S (или Win+Q)", "Win+L", "Ctrl+F", "Win+E"],
        correct: 0,
        explanation: "Win+S открывает строку поиска, где можно найти документы и программы."
      },
      {
        question: "29. Что такое драйвер?",
        options: ["Программа, управляющая работой устройства", "Вирус", "Файл с паролями", "Беспроводная сеть"],
        correct: 0,
        explanation: "Драйвер обеспечивает взаимодействие ОС с конкретным оборудованием (принтером, видеокартой)."
      },
      {
        question: "30. BIOS/UEFI — это…",
        options: ["Новая операционная система", "Программа начальной загрузки и настройки оборудования", "Текстовый редактор", "Антивирус"],
        correct: 1,
        explanation: "BIOS/UEFI запускается при включении, проверяет компоненты и загружает ОС."
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let xp = 0;
    let answered = false;
    const totalQuestions = questions.length;

    const xpDisplay = document.getElementById('xpDisplay');
    const questionCounter = document.getElementById('questionCounter');
    const progressFill = document.getElementById('progressFill');
    const quizContainer = document.getElementById('quizContainer');
    const nextBtn = document.getElementById('nextBtn');
    const finalResultDiv = document.getElementById('finalResult');

    function updateProgress() {
      questionCounter.textContent = `${currentIndex+1}/${totalQuestions}`;
      const percent = ((currentIndex) / totalQuestions) * 100; // до перехода к следующему
      progressFill.style.width = `${percent}%`;
    }

    function addXP(points) {
      xp += points;
      xpDisplay.textContent = `⚡ ${xp} XP`;
    }

    function renderQuestion() {
      if (currentIndex >= totalQuestions) {
        showFinalResult();
        return;
      }
      const q = questions[currentIndex];
      answered = false;
      nextBtn.style.display = 'none';
      
      let html = `<div class="question-text">${q.question}</div><div class="options-grid">`;
      q.options.forEach((opt, idx) => {
        html += `<button class="option-btn" data-option-index="${idx}">${opt}</button>`;
      });
      html += `</div><div id="explanationArea" class="explanation" style="display: none;"></div>`;
      quizContainer.innerHTML = html;

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', optionClickHandler);
      });

      updateProgress();
    }

    function optionClickHandler(e) {
      if (answered) return;
      const selectedBtn = e.currentTarget;
      const selectedIdx = parseInt(selectedBtn.getAttribute('data-option-index'));
      const q = questions[currentIndex];
      const correctIdx = q.correct;
      const explanationArea = document.getElementById('explanationArea');

      // Блокируем все кнопки
      document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

      // Подсвечиваем правильный и неправильный
      document.querySelectorAll('.option-btn').forEach((btn, idx) => {
        if (idx === correctIdx) {
          btn.classList.add('correct-choice');
        } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
          btn.classList.add('wrong-choice');
        }
      });

      // Показываем объяснение
      explanationArea.style.display = 'block';
      explanationArea.textContent = '💡 ' + q.explanation;

      if (selectedIdx === correctIdx) {
        score++;
        addXP(5);
      }

      answered = true;
      nextBtn.style.display = 'inline-flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < totalQuestions) {
        renderQuestion();
      } else {
        showFinalResult();
      }
    }

    function showFinalResult() {
      quizContainer.innerHTML = '';
      nextBtn.style.display = 'none';
      progressFill.style.width = '100%';
      questionCounter.textContent = `${totalQuestions}/${totalQuestions}`;
      
      let message = '';
      if (score === totalQuestions) message = '🏆 Идеально! Вы настоящий эксперт!';
      else if (score >= 22) message = '🎉 Отличный результат! Вы хорошо разбираетесь в ПК.';
      else if (score >= 14) message = '👍 Хорошо! Есть что вспомнить, но база крепкая.';
      else message = '📚 Продолжайте изучать компьютерную грамотность, всё получится!';
      
      finalResultDiv.style.display = 'block';
      finalResultDiv.innerHTML = `
        <div class="score-circle">${score}/${totalQuestions}</div>
        <h2>${message}</h2>
        <p style="margin-top:1rem;">Вы заработали <strong>${xp} XP</strong></p>
        <button class="btn" id="restartBtn" style="margin-top:1.5rem;">🔄 Пройти заново</button>
      `;
      document.getElementById('restartBtn').addEventListener('click', restartQuiz);
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      xp = 0;
      answered = false;
      xpDisplay.textContent = '⚡ 0 XP';
      finalResultDiv.style.display = 'none';
      renderQuestion();
    }

    nextBtn.addEventListener('click', nextQuestion);

    // Старт
    renderQuestion();
  })();
</script>
</body>
</html>
